apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: accessprep-ai
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/accessprep-ai/accessprep-ai:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: production
            - name: GCP_LOCATION
              value: asia-south1
            - name: USE_VERTEX_AI
              value: "false"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
